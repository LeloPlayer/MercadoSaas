<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MercadoSaaS - Gestão inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
      --verde: #1db954;
      --verde-dark: #17a349;
      --verde-soft: #e6f7ed;
      --laranja: #ff6b35;
      --amarelo: #f9c846;
      --bg: #0f1117;
      --bg2: #181c27;
      --bg3: #1e2333;
      --borda: #2a3148;
      --texto: #e8eaf0;
      --muted: #7a859e;
      --danger: #ff4757;
      --info: #3ecfcf;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0, 0, 0, .45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
      overflow-x: hidden;
    }

     /* ─── SIDEBAR ─── */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--borda);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform .3s;
    }

    .logo {
      padding: 28px 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--verde);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      line-height: 1.1;
    }

    .logo-text span {
      color: var(--verde);
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav {
      flex: 1;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14.5px;
      font-weight: 500;
      color: var(--muted);
      transition: all .2s;
      position: relative;
    }

    .nav-item:hover {
      background: var(--bg3);
      color: var(--texto);
    }

    .nav-item.active {
      background: rgba(29, 185, 84, .12);
      color: var(--verde);
    }

    .nav-item .icon {
      font-size: 18px;
      width: 22px;
      text-align: center;
    }

    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--borda);
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      background: var(--verde);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .user-info {
      font-size: 13px;
    }

    .user-info strong {
      display: block;
      font-weight: 600;
    }

    .user-info span {
      color: var(--muted);
      font-size: 11px;
    }





    
    </style>
</head>
<body>
    <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">🛒</div>
      <div class="logo-text">
        MercadoSaaS
        <span>Gestão Inteligente</span>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="goTo('dashboard', this)">
        <span class="icon">📊</span> Dashboard
      </div>
      <div class="nav-item" onclick="goTo('pdv', this)">
        <span class="icon">💳</span> PDV — Caixa
      </div>
      <div class="nav-item" onclick="goTo('produtos', this)">
        <span class="icon">📦</span> Produtos
      </div>
      <div class="nav-item" onclick="goTo('vendas', this)">
        <span class="icon">🧾</span> Vendas
      </div>
      <div class="nav-item" onclick="goTo('clientes', this)">
        <span class="icon">👥</span> Clientes
      </div>
      <div class="nav-item" onclick="goTo('estoque', this)" id="nav-estoque">
        <span class="icon">⚠️</span> Estoque
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">M</div>
        <div class="user-info">
          <strong>Mercadinho do Zé</strong>
          <span>Plano Pro ✨</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">📊 Dashboard</div>
      <div class="topbar-right">
        <span id="clock" style="color: var(--muted); font-size: 14px;"></span>
        <button class="btn btn-primary" id="topbar-action" onclick="topbarAction()">+ Novo</button>
      </div>
    </div>

</body>
</html>
