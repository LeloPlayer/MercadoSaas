    <style>
        :root {
      --verde: #1db954;
      --verde-dark: #17a349;
      --verde-soft: #e6f7ed;
      --laranja: #ff6b35;
      --amarelo: #f9c846;
      --bg: #0f1117;
      --bg2: #181c27;
      --bg3: #1e2333;
      --borda: #2a3148;
      --texto: #e8eaf0;
      --muted: #7a859e;
      --danger: #ff4757;
      --info: #3ecfcf;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0, 0, 0, .45);

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);

      overflow-x: hidden;
