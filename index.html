<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MercadoSaaS - Gestão inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
      --verde: #1db954;
      --verde-dark: #17a349;
      --verde-soft: #e6f7ed;
      --laranja: #ff6b35;
      --amarelo: #f9c846;
      --bg: #0f1117;
      --bg2: #181c27;
      --bg3: #1e2333;
      --borda: #2a3148;
      --texto: #e8eaf0;
      --muted: #7a859e;
      --danger: #ff4757;
      --info: #3ecfcf;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0, 0, 0, .45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
      overflow-x: hidden;
    }

     /* ─── SIDEBAR ─── */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--borda);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform .3s;
    }

    .logo {
      padding: 28px 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--verde);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      line-height: 1.1;
    }

    .logo-text span {
      color: var(--verde);
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    



    
    </style>
</head>
<body>
    
</body>
</html>
